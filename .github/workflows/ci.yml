name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.84+ and wasm32v1-none target
        run: |
          rustup toolchain install stable
          rustup target add wasm32v1-none

      - name: Run tests
        run: cargo test

      - name: Build WASM
        run: cargo build --release --target wasm32v1-none

      - name: Install Stellar CLI
        run: cargo install --locked stellar-cli --features opt

      - name: Optimize WASM
        run: stellar contract optimize --wasm target/wasm32v1-none/release/sharpy.wasm

      - name: Upload optimized WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sharpy.optimized.wasm
          path: target/wasm32v1-none/release/sharpy.optimized.wasm
